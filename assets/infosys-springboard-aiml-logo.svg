<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous Learning Agent</title>
  <desc id="desc">Modern industry-style logo for the autonomous learning agent project.</desc>
